<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MineClub | Sign Up</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Press+Start+2P&display=swap');
        body { 
            margin: 0; background-color: #0b0f19;
            background-image: linear-gradient(rgba(82, 255, 82, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(82, 255, 82, 0.03) 1px, transparent 1px);
            background-size: 45px 45px; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Roboto', sans-serif; color: white; 
        }
        .box { background: rgba(15, 23, 42, 0.8); padding: 30px; border-radius: 20px; border: 1px solid rgba(82, 255, 82, 0.3); width: 400px; text-align: center; backdrop-filter: blur(10px); box-shadow: 0 0 30px rgba(82, 255, 82, 0.15); }
        .title { font-family: 'Press Start 2P', cursive; color: #52FF52; font-size: 16px; margin-bottom: 25px; text-transform: uppercase; }
        label { display: block; text-align: left; font-size: 11px; color: #52FF52; margin: 0 0 5px 5px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin-bottom: 12px; background: rgba(0, 0, 0, 0.6); border: 1px solid #334155; color: #fff; border-radius: 8px; box-sizing: border-box; outline: none; transition: 0.3s; font-family: 'Roboto', sans-serif; }
        input:focus, select:focus { border-color: #52FF52; box-shadow: 0 0 10px rgba(82,255,82,0.3); }
        .dob-container { display: flex; gap: 10px; margin-bottom: 12px; }
        .dob-container select { margin-bottom: 0; cursor: pointer; color-scheme: dark; }
        .btn { width: 100%; background: #52FF52; color: #000; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn:hover { background: #fff; transform: translateY(-2px); }
        #verifySection { display: none; margin-top: 20px; border-top: 1px solid #334155; padding-top: 20px; }
        #status { margin-top: 15px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h2 class="title">Create Account</h2>
        <form id="signupForm">
            <input type="text" id="fname" placeholder="Full Name" required>
            <label>BIRTH DATE:</label>
            <div class="dob-container">
                <select id="dob-day" required><option value="" disabled selected>Day</option></select>
                <select id="dob-month" required>
                    <option value="" disabled selected>Month</option>
                    <option value="01">01 - January</option><option value="02">02 - February</option><option value="03">03 - March</option><option value="04">04 - April</option><option value="05">05 - May</option><option value="06">06 - June</option><option value="07">07 - July</option><option value="08">08 - August</option><option value="09">09 - September</option><option value="10">10 - October</option><option value="11">11 - November</option><option value="12">12 - December</option>
                </select>
                <select id="dob-year" required><option value="" disabled selected>Year</option></select>
            </div>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="pass" placeholder="Password" required>
            <button type="submit" class="btn">Send Verification Code</button>
        </form>

        <div id="verifySection">
            <input type="text" id="vCode" placeholder="Enter 6-Digit Code" maxlength="6" required>
            <button id="verifyBtn" class="btn" style="background: #fff;">Verify & Register</button>
        </div>
        <div id="status"></div>
    </div>

    <script>
        const daySelect = document.getElementById('dob-day');
        for (let d = 1; d <= 31; d++) {
            let val = d < 10 ? '0' + d : d;
            daySelect.innerHTML += `<option value="${val}">${val}</option>`;
        }
        const yearSelect = document.getElementById('dob-year');
        const currentYear = new Date().getFullYear();
        for (let y = currentYear; y >= 1950; y--) {
            yearSelect.innerHTML += `<option value="${y}">${y}</option>`;
        }

        // احرص تحط بياناتك هنا
        const SUPABASE_URL = "https://ztkickcodkkpdidvhptn.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_4uACtNbYdjBMzixLu4-gbQ_P7ljI33t";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        emailjs.init("gWPVwp_AdEm3E6skj"); 

        let generatedCode = ""; 
        const avatars = [
            "https://api.dicebear.com/7.x/pixel-art/svg?seed=John",
            "https://api.dicebear.com/7.x/pixel-art/svg?seed=Jane",
            "https://api.dicebear.com/7.x/pixel-art/svg?seed=Mike"
        ];

       document.getElementById('signupForm').onsubmit = async function(e) {
    e.preventDefault();
    const status = document.getElementById('status');
    const emailInput = document.getElementById('email').value;

    // --- نظام الـ Rate Limit لحماية الموقع من خويك ---
    const NOW = Date.now();
    const LAST_REQUEST = localStorage.getItem('last_signup_request');
    const COOLDOWN_TIME = 60000; // الوقت بالملي ثانية (60000 تعني دقيقة كاملة)

    if (LAST_REQUEST && (NOW - LAST_REQUEST < COOLDOWN_TIME)) {
        const timeLeft = Math.ceil((COOLDOWN_TIME - (NOW - LAST_REQUEST)) / 1000);
        status.style.color = "#ff4444";
        status.innerText = `Calm down bro! Please wait ${timeLeft} seconds before trying again.`;
        return; // يقفل الدالة فوراً ومستحيل يرسل للسوبابيز أو إيميل جي إس
    }
    // --------------------------------------------------

    status.style.color = "#52FF52";
    status.innerText = "Checking if email exists...";

    try {
        // فحص مسبق في Supabase لمنع تكرار الحسابات
        const { data: existingUser } = await supabaseClient.from('accounts').select('email').eq('email', emailInput).maybeSingle();
        if (existingUser) {
            status.style.color = "#ff4444";
            status.innerText = "Email already registered!";
            return;
        }

        status.innerText = "Sending code to your email...";
        generatedCode = Math.floor(100000 + Math.random() * 900000).toString();

        // إرسال الكود عبر EmailJS
        await emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", {
            email: emailInput,
            passcode: generatedCode
        });

        // إذا نجح الإرسال، نسجل وقت الطلب بالمتصفح عشان يبدأ الـ Cooldown
        localStorage.setItem('last_signup_request', NOW);

        document.getElementById('signupForm').style.display = "none";
        document.getElementById('verifySection').style.display = "block";
        status.innerText = "Code sent! Please check your inbox.";

    } catch (err) {
        status.style.color = "#ff4444";
        status.innerText = "Something went wrong. Try again!";
        console.error(err);
    }
};

            status.style.color = "#52FF52";
            status.innerText = "Checking if email exists...";

            const { data: existingUser } = await supabaseClient.from('accounts').select('email').eq('email', emailInput).maybeSingle();
            if (existingUser) {
                status.style.color = "#ff4444";
                status.innerText = "Email already registered!";
                return;
            }

            status.innerText = "Sending code to your email...";
            generatedCode = Math.floor(100000 + Math.random() * 900000).toString();

            emailjs.send("service_ecugym9", "template_tx3zt38", {
                email: emailInput,
                passcode: generatedCode
            }).then(() => {
                document.getElementById('signupForm').style.display = "none";
                document.getElementById('verifySection').style.display = "block";
                status.innerText = "Code sent! Please check your inbox.";
            }).catch(() => {
                status.style.color = "#ff4444";
                status.innerText = "Failed to send verification code.";
            });
        };

        document.getElementById('verifyBtn').onclick = async function() {
            const inputCode = document.getElementById('vCode').value;
            const status = document.getElementById('status');

            if (inputCode === generatedCode) {
                status.innerText = "Creating account...";

                const year = document.getElementById('dob-year').value;
                const month = document.getElementById('dob-month').value;
                const day = document.getElementById('dob-day').value;
                
                const randomAvatar = avatars[Math.floor(Math.random() * avatars.length)];
                const fullName = document.getElementById('fname').value;

                const userData = {
                    name: fullName,
                    dob: `${year}-${month}-${day}`,
                    email: document.getElementById('email').value,
                    password: document.getElementById('pass').value,
                    avatar: randomAvatar
                };

                const { error } = await supabaseClient.from('accounts').insert([userData]);

                if (!error) {
                    // السحر هنا: نحفظ الجلسة فوراً عشان يروح للاندكس مسجل دخول وجاهز!
                    localStorage.setItem('minecore_user', JSON.stringify(userData));
                    alert("Account Created Successfully!");
                    window.location.href = "index.html"; // يطير على الاندكس فوراً
                } else {
                    status.style.color = "#ff4444";
                    status.innerText = "Error: " + error.message;
                }
            } else {
                alert("Incorrect code! Please try again.");
            }
        };
    </script>
</body>
</html>
